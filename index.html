<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Inversión Interactivo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark-blue: #000b41;
            --accent-orange: #ff9e5e;
            --soft-purple: #d1d5f5;
            --bg-light: #f8f9fb;
            --text-gray: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #fff;
            color: var(--dark-blue);
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        .subtitle { font-size: 1.1rem; color: var(--text-gray); max-width: 700px; margin: 0 auto; }

        .app-grid {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 50px;
            align-items: start;
        }

        .sidebar {
            background-color: var(--bg-light);
            padding: 30px;
            border-radius: 20px;
        }

        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--text-gray); }

        .input-wrapper {
            position: relative;
            background: white;
            border: 1.5px solid #e0e4e9;
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }

        input[type="number"], select {
            border: none;
            outline: none;
            width: 100%;
            font-size: 1rem;
            color: var(--dark-blue);
            background: transparent;
            cursor: pointer;
        }

        .unit { font-weight: 600; margin-left: 5px; }

        input[type="range"] { width: 100%; margin-top: 15px; accent-color: var(--dark-blue); }

        .range-labels { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-gray); margin-top: 5px; }

        .chart-container { position: relative; height: 450px; }

        .floating-info {
            position: absolute;
            top: 10px;
            left: 20px;
            background-color: var(--dark-blue);
            color: white;
            padding: 25px;
            border-radius: 15px;
            z-index: 10;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .floating-info h3 { margin: 0 0 12px 0; font-size: 1.1rem; }
        .floating-info p { margin: 0; font-size: 0.95rem; line-height: 1.5; opacity: 0.9; }

        .disclaimer {
            margin-top: 60px;
            background-color: #e6f1fe;
            padding: 18px 25px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @media (max-width: 850px) {
            .app-grid { grid-template-columns: 1fr; }
            .chart-container { height: 350px; margin-top: 100px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>¿Cómo podría evolucionar tu inversión con un plan?</h1>
        <p class="subtitle">Cada aportación suma y te ayuda a construir una base sólida para el futuro.</p>
    </header>

    <div class="app-grid">
        <div class="sidebar">
            <div class="form-group">
                <label>Cantidad inicial a invertir</label>
                <div class="input-wrapper">
                    <input type="number" id="initAmount" value="300">
                    <span class="unit">€</span>
                </div>
            </div>

            <div class="form-group">
                <label>Periodicidad de la inversión</label>
                <div class="input-wrapper">
                    <select id="period">
                        <option value="12">Mensual</option>
                        <option value="6">Bimestral</option>
                        <option value="4">Trimestral</option>
                        <option value="3">Cuatrimestral</option>
                        <option value="2">Semestral</option>
                        <option value="1">Anual</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Cantidad recurrente a invertir</label>
                <div class="input-wrapper">
                    <input type="number" id="recurringAmount" value="300">
                    <span class="unit">€</span>
                </div>
            </div>

            <div class="form-group">
                <label>Rentabilidad deseada (<span id="roiVal">5%</span>)</label>
                <input type="range" id="roi" min="-3" max="10" value="5" step="0.5">
                <div class="range-labels">
                    <span>-3%</span>
                    <span>10%</span>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <div class="floating-info">
                <h3 id="infoTitle">Rentabilidad del 5%</h3>
                <p id="infoDesc">
                    En 15 años, tu aportación total de <strong id="totalInput">0€</strong> podría convertirse en <strong id="totalFinal">0€</strong>
                </p>
            </div>
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <div class="disclaimer">
        ⓘ Las proyecciones no son un indicador fidedigno de resultados futuros.
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    let myChart;

    function calculate() {
        const init = parseFloat(document.getElementById('initAmount').value) || 0;
        const recurring = parseFloat(document.getElementById('recurringAmount').value) || 0;
        const roi = parseFloat(document.getElementById('roi').value) / 100;
        const timesPerYear = parseInt(document.getElementById('period').value);
        
        const years = 15;
        const labels = [];
        const investedPath = [];
        const growthPath = [];

        let currentTotal = init;
        let totalInvested = init;

        for (let i = 0; i <= years; i++) {
            labels.push(i === 0 ? 'Hoy' : i + ' años');
            investedPath.push(totalInvested);
            growthPath.push(Math.round(currentTotal));

            // Aportaciones del año según periodicidad
            const annualContribution = recurring * timesPerYear;
            totalInvested += annualContribution;
            // Crecimiento compuesto anual
            currentTotal = (currentTotal + annualContribution) * (1 + roi);
        }

        updateUI(totalInvested - (recurring * timesPerYear), growthPath[years], (roi * 100));
        renderChart(labels, investedPath, growthPath);
    }

    function updateUI(totalIn, totalOut, rate) {
        document.getElementById('roiVal').innerText = rate + '%';
        document.getElementById('infoTitle').innerText = `Rentabilidad deseada del ${rate}%`;
        document.getElementById('totalInput').innerText = totalIn.toLocaleString('es-ES') + '€';
        document.getElementById('totalFinal').innerText = totalOut.toLocaleString('es-ES') + '€';
    }

    function renderChart(labels, invested, growth) {
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { data: growth, borderColor: '#ff9e5e', borderWidth: 3, pointRadius: 0, tension: 0.3 },
                    { data: invested, borderColor: '#d1d5f5', borderWidth: 2, pointRadius: 0, tension: 0, borderDash: [5, 5] }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { position: 'right', ticks: { callback: v => v.toLocaleString() + '€' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calculate));
    calculate();
</script>

</body>
</html>
